<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Churn Prediction</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
        .card {
            border-radius: 15px;
        }
        .title {
            font-weight: 600;
        }
        .result-box {
            background: #eef2ff;
            border-radius: 10px;
            padding: 15px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">
        <h3 class="text-center mb-4 title">📊 Customer Churn Predictor</h3>

        <form action="/predict" method="post">

            <div class="row">

                <!-- Left Column -->
                <div class="col-md-6">

                    <label class="form-label">Age</label>
                    <input type="number" name="age" class="form-control" required>

                    <label class="form-label mt-3">Gender</label>
                    <select name="gender" class="form-select">
                        <option value="" disabled selected>Select</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>


                    <label class="form-label mt-3">Region</label>
                    <select name="region" class="form-select">
                        <option value="" disabled selected>Select</option>
                        <option>North</option>
                        <option>South</option>
                        <option>East</option>
                        <option>West</option>
                    </select>

                    <label class="form-label mt-3">Senior Citizen</label>
                    <select name="senior_citizen" class="form-select">
                        <option value="" disabled selected>Select</option>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>

                    <label class="form-label mt-3">Partner</label>
                    <select name="partner" class="form-select">
                        <option value="" disabled selected>Select</option>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>

                    <label class="form-label mt-3">Tenure (Months)</label>
                    <input type="number" name="tenure_months" class="form-control">

                    <label class="form-label mt-3">Contract Type</label>
                    <select name="contract_type" class="form-select">
                        <option value="" disabled selected>Select</option>
                        <option>Month-to-month</option>
                        <option>One year</option>
                        <option>Two year</option>
                    </select>

                    <label class="form-label mt-3">Payment Method</label>
                    <select name="payment_method" class="form-select">
                        <option value="" disabled selected>Select</option>
                        <option>Electronic check</option>
                        <option>Bank transfer</option>
                        <option>Mailed check</option>
                        <option>Credit card</option>
                    </select>

                </div>

                <!-- Right Column -->
                <div class="col-md-6">

                    <label class="form-label">Internet Service</label>
                    <select name="internet_service" class="form-select">
                        <option value="" disabled selected>Select</option>
                        <option>DSL</option>
                        <option>Fiber optic</option>
                        <option>None</option>
                    </select>

                    <label class="form-label mt-3">Monthly Charges</label>
                    <input type="number" step="0.01" name="monthly_charges" class="form-control">

                    <label class="form-label mt-3">Total Charges</label>
                    <input type="number" step="0.01" name="total_charges" class="form-control">

                    <label class="form-label mt-3">Avg Monthly Calls</label>
                    <input type="number" name="avg_monthly_calls" class="form-control">

                    <label class="form-label mt-3">Data Usage (GB)</label>
                    <input type="number" step="0.1" name="data_usage_gb" class="form-control">

                    <label class="form-label mt-3">Support Tickets</label>
                    <input type="number" name="support_tickets" class="form-control" min="0" placeholder="Enter number of tickets" required>

                    <label class="form-label mt-3">Streaming TV</label>
                    <select name="streaming_tv" class="form-select">
                        <option value="" disabled selected>Select</option>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>

                    <label class="form-label mt-3">Tech Support</label>
                    <select name="tech_support" class="form-select">
                        <option value="" disabled selected>Select</option>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>

                    <label class="form-label mt-3">Online Backup</label>
                    <select name="online_backup" class="form-select">
                        <option value="" disabled selected>Select</option>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>

                </div>

            </div>

            <div class="text-center mt-4">
                <button class="btn btn-primary btn-lg px-5">Predict</button>
            </div>

        </form>

        {% if result %}
        <div class="result-box mt-4 text-center">
            <h4>Prediction: <b>{{ result }}</b></h4>
            <h5>Probability: {{ probability }}</h5>
            <h6>Risk Level: {{ risk }}</h6>
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
